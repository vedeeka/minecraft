<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>3D Model Viewer</title>

<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100vw;
    height:100vh;
    overflow:hidden;
    background:#111;
    font-family:Arial, sans-serif;
}

model-viewer{
    width:100%;
    height:100vh;
    background:
    radial-gradient(circle at center,
    #2c2c2c 0%,
    #161616 50%,
    #000000 100%);
}

.loading{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:white;
    font-size:18px;
    z-index:10;
}

.top-bar{
    position:absolute;
    top:20px;
    left:20px;
    z-index:20;
    color:white;
    background:rgba(0,0,0,0.5);
    padding:12px 18px;
    border-radius:12px;
    backdrop-filter:blur(10px);
}

.top-bar h2{
    font-size:18px;
    margin-bottom:5px;
}

.top-bar p{
    font-size:13px;
    opacity:0.8;
}

.controls{
    position:absolute;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    z-index:20;
    display:flex;
    gap:10px;
}

button{
    border:none;
    padding:12px 18px;
    border-radius:12px;
    cursor:pointer;
    background:white;
    font-weight:bold;
}

button:hover{
    opacity:0.9;
}
</style>
</head>

<body>

<div class="loading" id="loader">
Loading Model...
</div>

<div class="top-bar">
    <h2>3D Model Viewer</h2>
    <p>Drag to rotate • Scroll to zoom</p>
</div>

<model-viewer
    id="viewer"
    src="model.glb"
    alt="3D Model"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    exposure="1"
    environment-image="neutral"
    ar
    loading="eager">
</model-viewer>

<div class="controls">
    <button onclick="toggleRotate()">Rotate</button>
    <button onclick="resetCamera()">Reset View</button>
</div>

<script>
const viewer = document.getElementById('viewer');
const loader = document.getElementById('loader');

viewer.addEventListener('load', () => {
    loader.style.display = 'none';
});

function toggleRotate() {
    viewer.autoRotate = !viewer.autoRotate;
}

function resetCamera() {
    viewer.cameraOrbit = "0deg 75deg 105%";
}
</script>

</body>
</html>
